services:

  backend:
    build:
      context: ./backend
    container_name: rifle-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: rifle-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules
    command: sh -c "npm install && npm run dev"

  db:
    image: postgres:15
    container_name: rifle-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rifle_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    

  adminer:
    image: adminer
    container_name: rifle-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
  node_modules:
  node_modules_frontend: