name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  
  frontend-build-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Lint Frontend
      run: npm run lint

    - name: Test Frontend
      run: npm test run -- --passWithNoTests

    - name: Build Frontend
      run: npm run build

  backend-build-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        # cache: 'npm' # Uncomment if lock file exists

    - name: Install Backend Dependencies
      run: npm install # Using install instead of ci because lock file might be missing or out of sync

    # - name: Lint Backend
    #   run: npm run lint

    # - name: Test Backend
    #   run: npm test
